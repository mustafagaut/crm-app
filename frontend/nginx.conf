server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing — any path that isn't a real
    # file (e.g. /contacts, /logs) must fall back to index.html so the
    # SPA's router can handle it, instead of Nginx returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable caching for hashed static assets Vite produces
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
